models:
  - name: "gpt-oss-120b-vllm"
    base_url: "http://earlsinclair.ornl.gov:8200/v1"
    model: "openai/gpt-oss-120b"
    provider: "vllm"
    temperature: 0.2
    timeout: 1200

# Parallel execution settings for querying multiple LLM servers concurrently
parallel_execution:
  enabled: true
  max_concurrent_servers: 1
  request_timeout: 600
  retry_attempts: 2
  retry_delay: 1.0
  enable_llm_json_fix: true
